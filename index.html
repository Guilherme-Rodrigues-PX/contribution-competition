<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribution City 2026</title>
    <meta name="description" content="Uma cidade 3D imaginaria onde cada dev da empresa vira um predio em disputa pelos commits de 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050915;
            --bg-soft: rgba(11, 18, 38, 0.84);
            --panel: rgba(13, 22, 46, 0.82);
            --panel-border: rgba(148, 180, 255, 0.16);
            --text: #edf2ff;
            --muted: #98a9cf;
            --gold: #ffcf66;
            --cyan: #89d7ff;
            --shadow: rgba(0, 0, 0, 0.34);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(47, 83, 176, 0.32), transparent 28%),
                radial-gradient(circle at 20% 20%, rgba(255, 207, 102, 0.12), transparent 18%),
                linear-gradient(180deg, #081224 0%, #050915 54%, #04070f 100%);
            overflow-x: hidden;
        }

        a {
            color: inherit;
        }

        .app {
            width: min(1380px, calc(100vw - 32px));
            margin: 24px auto;
            display: grid;
            gap: 18px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: 0 20px 60px var(--shadow);
            backdrop-filter: blur(18px);
        }

        .top-bar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .hero {
            border-radius: 28px;
            padding: 24px 26px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 16% 16%, rgba(255, 209, 112, 0.14), transparent 22%),
                linear-gradient(110deg, rgba(137, 215, 255, 0.06), transparent 48%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 207, 102, 0.22);
            background: rgba(255, 207, 102, 0.08);
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .hero h1 {
            margin-top: 18px;
            font-size: clamp(2.5rem, 5vw, 4.4rem);
            line-height: 0.96;
            max-width: 10ch;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin-top: 16px;
            max-width: 58ch;
            color: var(--muted);
            line-height: 1.55;
            font-size: 1rem;
        }

        .hero-meta {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hero-chip {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #dce7ff;
            font-size: 0.85rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .summary-card {
            border-radius: 24px;
            padding: 22px 20px;
            min-height: 148px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .summary-card strong {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.35rem, 2.5vw, 2rem);
        }

        .summary-card span {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.75rem;
        }

        .summary-card small {
            color: #bfd3ff;
            line-height: 1.45;
            font-size: 0.88rem;
        }

        .city-stage {
            position: relative;
            min-height: 90vh;
            border-radius: 34px;
            overflow: hidden;
        }

        .city-scene {
            width: 100%;
            height: 90vh;
            min-height: 700px;
        }

        .scene-toolbar {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .toolbar-btn {
            padding: 8px 14px;
            border-radius: 14px;
            border: 1px solid rgba(148, 180, 255, 0.2);
            background: rgba(8, 14, 30, 0.72);
            backdrop-filter: blur(12px);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .toolbar-btn:hover {
            background: rgba(255, 207, 102, 0.12);
            border-color: rgba(255, 207, 102, 0.3);
        }

        .scene-hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px;
        }

        .scene-card {
            max-width: 320px;
            border-radius: 22px;
            padding: 16px 18px;
            background: rgba(8, 14, 30, 0.62);
            border: 1px solid rgba(148, 180, 255, 0.14);
            backdrop-filter: blur(18px);
        }

        .scene-card h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--gold);
        }

        .scene-card p,
        .scene-card li {
            color: #b6c7ea;
            line-height: 1.5;
            font-size: 0.92rem;
        }

        .scene-card ul {
            list-style: none;
            display: grid;
            gap: 6px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
            gap: 18px;
        }

        .focus-panel,
        .leaderboard {
            border-radius: 28px;
            padding: 22px;
        }

        .focus-panel {
            display: grid;
            gap: 18px;
            align-content: start;
        }

        .focus-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .focus-avatar {
            width: 76px;
            height: 76px;
            border-radius: 22px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 14px 34px rgba(0,0,0,0.28);
        }

        .focus-kicker {
            color: var(--gold);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .focus-panel h3 {
            font-size: 1.7rem;
            line-height: 1.05;
            margin-top: 5px;
        }

        .focus-copy {
            color: var(--muted);
            line-height: 1.58;
            font-size: 0.95rem;
        }

        .focus-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .stat-tile {
            border-radius: 18px;
            padding: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .stat-tile strong {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 1.05rem;
        }

        .stat-tile span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .badge--gold {
            background: rgba(255, 207, 102, 0.16);
            border: 1px solid rgba(255, 207, 102, 0.3);
            color: #ffd56d;
        }

        .badge--cyan {
            background: rgba(137, 215, 255, 0.14);
            border: 1px solid rgba(137, 215, 255, 0.26);
            color: #89d7ff;
        }

        .badge--purple {
            background: rgba(183, 146, 255, 0.14);
            border: 1px solid rgba(183, 146, 255, 0.26);
            color: #b792ff;
        }

        .badge--green {
            background: rgba(111, 221, 139, 0.14);
            border: 1px solid rgba(111, 221, 139, 0.26);
            color: #6fdd8b;
        }

        .badge--orange {
            background: rgba(255, 144, 121, 0.14);
            border: 1px solid rgba(255, 144, 121, 0.26);
            color: #ff9079;
        }

        .focus-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            padding: 12px 16px;
            border-radius: 16px;
            background: linear-gradient(90deg, rgba(255, 207, 102, 0.18), rgba(137, 215, 255, 0.14));
            border: 1px solid rgba(255, 207, 102, 0.24);
            text-decoration: none;
            font-weight: 600;
        }

        .leaderboard {
            display: grid;
            gap: 16px;
        }

        .leaderboard-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-end;
        }

        .leaderboard-head h2 {
            font-size: 1.45rem;
        }

        .leaderboard-head p {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .leaderboard-list {
            display: grid;
            gap: 12px;
        }

        .leaderboard-row {
            width: 100%;
            display: grid;
            grid-template-columns: auto 54px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            text-align: left;
            padding: 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .leaderboard-row:hover,
        .leaderboard-row.is-active {
            transform: translateY(-2px);
            border-color: rgba(255, 207, 102, 0.24);
            background: rgba(255,255,255,0.07);
        }

        .leaderboard-rank {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            font-family: 'Space Mono', monospace;
            color: var(--gold);
        }

        .leaderboard-row img {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            object-fit: cover;
        }

        .leaderboard-row strong {
            display: block;
            font-size: 1rem;
        }

        .leaderboard-row span {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .leaderboard-row em {
            font-style: normal;
            color: #d8e4ff;
            font-family: 'Space Mono', monospace;
            font-size: 0.92rem;
        }

        .chart-section {
            border-radius: 28px;
            padding: 22px;
        }

        .chart-header {
            margin-bottom: 14px;
        }

        .chart-header h2 {
            font-size: 1.45rem;
        }

        .chart-header p {
            color: var(--muted);
            font-size: 0.92rem;
            margin-top: 4px;
        }

        #history-chart {
            width: 100%;
            height: 280px;
            display: block;
        }

        .footer {
            text-align: center;
            color: rgba(216, 228, 255, 0.6);
            font-size: 0.86rem;
            padding: 4px 0 20px;
        }

        .loading,
        .error {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .loading-card,
        .error-card {
            width: min(520px, 100%);
            padding: 26px;
            border-radius: 28px;
            text-align: center;
        }

        .loading-card h1,
        .error-card h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .loading-card p,
        .error-card p {
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 1100px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .app {
                width: min(100vw - 18px, 1380px);
                margin: 12px auto;
            }

            .hero,
            .focus-panel,
            .leaderboard,
            .summary-card {
                padding: 18px;
            }

            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .focus-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .city-scene {
                min-height: 560px;
                height: 80vh;
            }

            .scene-hud {
                flex-direction: column;
                justify-content: space-between;
                align-items: stretch;
                gap: 12px;
            }

            .scene-card {
                max-width: none;
            }

            .leaderboard-row {
                grid-template-columns: auto 46px minmax(0, 1fr);
            }

            .leaderboard-row em {
                grid-column: 2 / -1;
                justify-self: end;
            }

            .scene-toolbar {
                top: 10px;
                right: 10px;
                gap: 4px;
            }

            .toolbar-btn {
                padding: 6px 10px;
                font-size: 0.72rem;
            }

            #history-chart {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="loading-card panel">
                <h1>Carregando a cidade</h1>
                <p>Gerando a skyline 3D da competicao e conectando os predios aos dados mais recentes.</p>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
