<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribution City 2026</title>
    <meta name="description" content="Uma cidade 3D imaginaria onde cada dev da empresa vira um predio em disputa pelos commits de 2026.">
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2a4d7a;
            --accent: #f0a500;
            --accent-light: #fdb913;
            --surface: #ffffff;
            --bg: #f5f7fa;
            --text: #1e3a5f;
            --muted: #4a5568;
            --border: #e2e8f0;
            --shadow: rgba(30, 58, 95, 0.08);
            --shadow-md: rgba(30, 58, 95, 0.12);
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
        }

        a {
            color: inherit;
        }

        /* ── Header bar ── */
        .site-header {
            background: var(--primary);
            color: #fff;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .site-header::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 100%;
            background: var(--accent);
        }

        .site-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            z-index: 1;
        }

        .site-header span {
            font-size: 0.82rem;
            opacity: 0.8;
            z-index: 1;
        }

        /* ── Main layout ── */
        .app {
            width: min(1280px, calc(100vw - 48px));
            margin: 24px auto;
            display: grid;
            gap: 20px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* ── Top bar ── */
        .top-bar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .hero {
            border-radius: var(--radius);
            padding: 28px 30px;
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--accent);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 200px;
            height: 100%;
            background: linear-gradient(135deg, rgba(240, 165, 0, 0.06), transparent);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(240, 165, 0, 0.1);
            border: 1px solid rgba(240, 165, 0, 0.25);
            color: #b07800;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .hero h1 {
            margin-top: 16px;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.05;
            max-width: 14ch;
            letter-spacing: -0.03em;
            color: var(--primary);
        }

        .hero p {
            margin-top: 12px;
            max-width: 60ch;
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .hero-meta {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .hero-chip {
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* ── Summary cards ── */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .summary-card {
            border-radius: var(--radius);
            padding: 20px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 4px solid var(--accent);
        }

        .summary-card strong {
            font-size: clamp(1.5rem, 2.5vw, 2.2rem);
            color: var(--primary);
            font-weight: 700;
        }

        .summary-card span {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .summary-card small {
            color: var(--muted);
            line-height: 1.45;
            font-size: 0.85rem;
        }

        /* ── 3D City scene (stays dark) ── */
        .city-stage {
            position: relative;
            min-height: 90vh;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow-md);
        }

        .city-scene {
            width: 100%;
            height: 90vh;
            min-height: 700px;
        }

        .scene-toolbar {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .toolbar-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(30, 58, 95, 0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .toolbar-btn:hover {
            background: rgba(240, 165, 0, 0.9);
            border-color: var(--accent);
            color: var(--primary);
        }

        .scene-hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px;
        }

        .scene-card {
            max-width: 320px;
            border-radius: var(--radius);
            padding: 16px 18px;
            background: rgba(30, 58, 95, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
        }

        .scene-card h2 {
            font-size: 1.15rem;
            margin-bottom: 8px;
            color: var(--accent-light);
        }

        .scene-card p,
        .scene-card li {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
            font-size: 0.88rem;
        }

        .scene-card ul {
            list-style: none;
            display: grid;
            gap: 6px;
        }

        /* ── Dashboard ── */
        .dashboard {
            display: grid;
            grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
            gap: 20px;
        }

        .focus-panel,
        .leaderboard {
            border-radius: var(--radius);
            padding: 24px;
        }

        .focus-panel {
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .focus-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .focus-avatar {
            width: 72px;
            height: 72px;
            border-radius: var(--radius);
            object-fit: cover;
            border: 2px solid var(--border);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .focus-kicker {
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .focus-panel h3 {
            font-size: 1.5rem;
            line-height: 1.1;
            margin-top: 4px;
            color: var(--primary);
        }

        .focus-copy {
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.92rem;
        }

        .focus-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-tile {
            border-radius: 8px;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .stat-tile strong {
            display: block;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }

        .stat-tile span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        /* ── Badges ── */
        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge--gold {
            background: rgba(240, 165, 0, 0.12);
            border: 1px solid rgba(240, 165, 0, 0.3);
            color: #b07800;
        }

        .badge--cyan {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.25);
            color: #0284c7;
        }

        .badge--purple {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: #7c3aed;
        }

        .badge--green {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #15803d;
        }

        .badge--orange {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.25);
            color: #c2410c;
        }

        .focus-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--primary);
            border: none;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .focus-link:hover {
            background: var(--primary-light);
        }

        /* ── Leaderboard ── */
        .leaderboard {
            display: grid;
            gap: 16px;
        }

        .leaderboard-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-end;
        }

        .leaderboard-head h2 {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .leaderboard-head p {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .leaderboard-list {
            display: grid;
            gap: 8px;
        }

        .leaderboard-row {
            width: 100%;
            display: grid;
            grid-template-columns: auto 50px minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            text-align: left;
            padding: 12px 14px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: inherit;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .leaderboard-row:hover,
        .leaderboard-row.is-active {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--shadow-md);
        }

        .leaderboard-rank {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .leaderboard-row:first-child .leaderboard-rank {
            background: var(--accent);
            color: var(--primary);
        }

        .leaderboard-row img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .leaderboard-row strong {
            display: block;
            font-size: 0.95rem;
            color: var(--primary);
        }

        .leaderboard-row span {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .leaderboard-row em {
            font-style: normal;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* ── Chart ── */
        .chart-section {
            border-radius: var(--radius);
            padding: 24px;
        }

        .chart-header {
            margin-bottom: 16px;
        }

        .chart-header h2 {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .chart-header p {
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: 4px;
        }

        #history-chart {
            width: 100%;
            height: 280px;
            display: block;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            padding: 8px 0 24px;
        }

        /* ── Loading / Error states ── */
        .loading,
        .error {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            background: var(--bg);
        }

        .loading-card,
        .error-card {
            width: min(480px, 100%);
            padding: 32px;
            border-radius: var(--radius);
            text-align: center;
        }

        .loading-card h1,
        .error-card h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .loading-card p,
        .error-card p {
            color: var(--muted);
            line-height: 1.6;
        }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .app {
                width: min(100vw - 16px, 1280px);
                margin: 12px auto;
            }

            .site-header {
                height: 48px;
                padding: 0 16px;
            }

            .site-header::after {
                width: 50px;
            }

            .hero,
            .focus-panel,
            .leaderboard,
            .summary-card {
                padding: 16px;
            }

            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .focus-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .city-scene {
                min-height: 560px;
                height: 80vh;
            }

            .scene-hud {
                flex-direction: column;
                justify-content: space-between;
                align-items: stretch;
                gap: 12px;
            }

            .scene-card {
                max-width: none;
            }

            .leaderboard-row {
                grid-template-columns: auto 44px minmax(0, 1fr);
            }

            .leaderboard-row em {
                grid-column: 2 / -1;
                justify-self: end;
            }

            .scene-toolbar {
                top: 10px;
                right: 10px;
                gap: 4px;
            }

            .toolbar-btn {
                padding: 6px 10px;
                font-size: 0.72rem;
            }

            #history-chart {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1>Contribution City</h1>
        <span>PX Ativos Judiciais</span>
    </header>
    <div id="app">
        <div class="loading">
            <div class="loading-card panel">
                <h1>Carregando a cidade</h1>
                <p>Gerando a skyline 3D da competicao e conectando os predios aos dados mais recentes.</p>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
