<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribution City 2026</title>
    <meta name="description" content="Uma cidade 3D imaginária onde cada dev da empresa vira um prédio em disputa pelos commits de 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f;
            --bg-soft: rgba(11, 18, 38, 0.84);
            --panel: rgba(13, 22, 46, 0.72);
            --panel-strong: rgba(17, 27, 56, 0.92);
            --panel-border: rgba(148, 180, 255, 0.14);
            --panel-border-strong: rgba(148, 180, 255, 0.28);
            --text: #edf2ff;
            --muted: #98a9cf;
            --dim: #6c7da8;
            --gold: #ffcf66;
            --silver: #d6dff5;
            --bronze: #f6a878;
            --cyan: #89d7ff;
            --magenta: #ff7bfa;
            --green: #6fdd8b;
            --red: #ff6b6b;
            --shadow: rgba(0, 0, 0, 0.42);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(89, 130, 255, 0.22), transparent 60%),
                radial-gradient(ellipse 60% 50% at 10% 20%, rgba(255, 207, 102, 0.10), transparent 55%),
                radial-gradient(ellipse 60% 50% at 90% 30%, rgba(255, 123, 250, 0.08), transparent 55%),
                linear-gradient(180deg, #06091a 0%, #04060f 60%, #02030a 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 180, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        a { color: inherit; }

        .app {
            position: relative;
            z-index: 1;
            width: min(1480px, calc(100vw - 32px));
            margin: 22px auto 40px;
            display: grid;
            gap: 18px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: 0 24px 70px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
        }

        /* ============ HERO ============ */
        .hero {
            border-radius: 32px;
            padding: 30px 34px 28px;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(280px, 1fr);
            gap: 32px;
            align-items: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 12% 24%, rgba(255, 207, 102, 0.18), transparent 28%),
                radial-gradient(circle at 88% 70%, rgba(137, 215, 255, 0.14), transparent 30%),
                linear-gradient(120deg, rgba(255, 123, 250, 0.05), transparent 60%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,207,102,0.4), transparent 30%, transparent 70%, rgba(137,215,255,0.3));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .hero-left { position: relative; z-index: 1; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 207, 102, 0.32);
            background: rgba(255, 207, 102, 0.10);
            color: var(--gold);
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .hero-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 12px var(--gold);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero h1 {
            font-family: 'Bebas Neue', 'Space Grotesk', sans-serif;
            margin-top: 18px;
            font-size: clamp(2.8rem, 6vw, 5.4rem);
            line-height: 0.92;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff 10%, #ffd56d 50%, #89d7ff 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-sub {
            margin-top: 14px;
            max-width: 62ch;
            color: var(--muted);
            line-height: 1.55;
            font-size: 1.02rem;
        }

        .hero-meta {
            margin-top: 22px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .hero-chip {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #dce7ff;
            font-size: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .hero-chip strong {
            color: var(--text);
            font-family: 'Space Mono', monospace;
        }

        /* Year progress */
        .year-progress {
            position: relative;
            z-index: 1;
            border-radius: 22px;
            padding: 22px 24px;
            background: rgba(8, 14, 30, 0.55);
            border: 1px solid var(--panel-border);
        }

        .year-progress-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 14px;
        }

        .year-progress-head .kicker {
            color: var(--gold);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 600;
        }

        .year-progress-head h3 {
            margin-top: 4px;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .year-progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            line-height: 1;
            color: var(--gold);
        }

        .year-bar {
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }

        .year-bar-fill {
            position: absolute;
            inset: 0 auto 0 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--gold), var(--magenta), var(--cyan));
            box-shadow: 0 0 22px rgba(255, 207, 102, 0.55);
        }

        .year-progress-foot {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--dim);
            font-family: 'Space Mono', monospace;
        }

        /* ============ KPI ROW ============ */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
        }

        .kpi-card {
            border-radius: 22px;
            padding: 18px 18px 16px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 22px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent, rgba(255,207,102,0.5)), transparent 60%);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
        }

        .kpi-card .kpi-label {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.10em;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .kpi-card .kpi-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.7rem, 2.6vw, 2.4rem);
            line-height: 1;
            margin-top: 8px;
            letter-spacing: 0.01em;
        }

        .kpi-card .kpi-foot {
            margin-top: 12px;
            color: var(--dim);
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .kpi-card .kpi-foot strong { color: var(--text); font-family: 'Space Mono', monospace; }

        .kpi--gold .kpi-value { color: var(--gold); }
        .kpi--gold { --accent: rgba(255,207,102,0.5); }
        .kpi--cyan .kpi-value { color: var(--cyan); }
        .kpi--cyan { --accent: rgba(137,215,255,0.5); }
        .kpi--magenta .kpi-value { color: var(--magenta); }
        .kpi--magenta { --accent: rgba(255,123,250,0.5); }
        .kpi--green .kpi-value { color: var(--green); }
        .kpi--green { --accent: rgba(111,221,139,0.5); }
        .kpi--silver .kpi-value { color: var(--silver); }
        .kpi--silver { --accent: rgba(214,223,245,0.4); }
        .kpi--bronze .kpi-value { color: var(--bronze); }
        .kpi--bronze { --accent: rgba(246,168,120,0.5); }

        /* ============ PODIUM ============ */
        .podium {
            border-radius: 28px;
            padding: 24px 26px 30px;
        }

        .podium-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 18px;
        }

        .podium-head h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 0.02em;
        }

        .podium-head p { color: var(--muted); font-size: 0.88rem; }

        .podium-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            align-items: end;
        }

        .podium-slot {
            position: relative;
            border-radius: 22px;
            padding: 22px 18px 20px;
            text-align: center;
            border: 1px solid var(--panel-border);
            background: rgba(8, 14, 30, 0.55);
            overflow: hidden;
        }

        .podium-slot.is-first {
            background: linear-gradient(180deg, rgba(255, 207, 102, 0.14), rgba(255, 207, 102, 0.02));
            border-color: rgba(255, 207, 102, 0.32);
            box-shadow: 0 22px 60px rgba(255, 207, 102, 0.18);
            transform: translateY(-12px);
        }

        .podium-slot.is-second {
            background: linear-gradient(180deg, rgba(214, 223, 245, 0.10), rgba(214, 223, 245, 0.02));
            border-color: rgba(214, 223, 245, 0.22);
        }

        .podium-slot.is-third {
            background: linear-gradient(180deg, rgba(246, 168, 120, 0.10), rgba(246, 168, 120, 0.02));
            border-color: rgba(246, 168, 120, 0.22);
        }

        .podium-rank {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.4rem;
            line-height: 1;
            margin-bottom: 6px;
        }

        .podium-slot.is-first .podium-rank { color: var(--gold); }
        .podium-slot.is-second .podium-rank { color: var(--silver); }
        .podium-slot.is-third .podium-rank { color: var(--bronze); }

        .podium-medal {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(0,0,0,0.4);
        }

        .podium-slot.is-first .podium-medal {
            background: radial-gradient(circle at 30% 30%, #ffe198, #c8901a);
            color: #4a2d00;
            box-shadow: 0 0 28px rgba(255,207,102,0.5);
        }
        .podium-slot.is-second .podium-medal {
            background: radial-gradient(circle at 30% 30%, #f3f6ff, #8e9bbf);
            color: #2c3454;
        }
        .podium-slot.is-third .podium-medal {
            background: radial-gradient(circle at 30% 30%, #ffc99a, #a8642d);
            color: #3e1d05;
        }

        .podium-avatar {
            width: 78px;
            height: 78px;
            border-radius: 22px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.18);
            box-shadow: 0 16px 36px rgba(0,0,0,0.4);
            margin: 0 auto 12px;
            display: block;
        }

        .podium-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .podium-commits {
            font-family: 'Space Mono', monospace;
            font-size: 1.4rem;
            color: var(--text);
        }

        .podium-commits small {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-top: 4px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .podium-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .pill {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
        }

        .pill.up { color: var(--green); background: rgba(111,221,139,0.10); border-color: rgba(111,221,139,0.25); }
        .pill.down { color: var(--red); background: rgba(255,107,107,0.10); border-color: rgba(255,107,107,0.25); }

        /* ============ CITY ============ */
        .city-stage {
            position: relative;
            min-height: 86vh;
            border-radius: 34px;
            overflow: hidden;
        }

        .city-scene {
            width: 100%;
            height: 86vh;
            min-height: 680px;
        }

        .scene-toolbar {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .toolbar-btn {
            padding: 9px 16px;
            border-radius: 14px;
            border: 1px solid rgba(148, 180, 255, 0.22);
            background: rgba(8, 14, 30, 0.72);
            backdrop-filter: blur(12px);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.84rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toolbar-btn:hover {
            background: rgba(255, 207, 102, 0.14);
            border-color: rgba(255, 207, 102, 0.34);
            transform: translateY(-1px);
        }

        /* ============ MOMENTUM / PACE ============ */
        .side-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .insight-panel {
            border-radius: 24px;
            padding: 22px 24px;
        }

        .insight-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .insight-head h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.55rem;
            letter-spacing: 0.02em;
        }

        .insight-head p {
            color: var(--muted);
            font-size: 0.82rem;
            margin-top: 2px;
        }

        .heat-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(255, 144, 121, 0.14);
            border: 1px solid rgba(255, 144, 121, 0.3);
            color: var(--bronze);
            font-size: 1.2rem;
        }

        .heat-list, .pace-list {
            display: grid;
            gap: 10px;
        }

        .heat-row {
            display: grid;
            grid-template-columns: auto 38px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .heat-row img {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            object-fit: cover;
        }

        .heat-row .heat-pos {
            width: 24px;
            height: 24px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 144, 121, 0.18);
            color: var(--bronze);
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
        }

        .heat-row strong { font-size: 0.95rem; display: block; }
        .heat-row span { color: var(--muted); font-size: 0.78rem; }

        .heat-delta {
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            padding: 4px 10px;
            border-radius: 10px;
        }

        .heat-delta.up {
            color: var(--green);
            background: rgba(111,221,139,0.12);
        }

        .heat-delta.down {
            color: var(--red);
            background: rgba(255,107,107,0.12);
        }

        .heat-delta.flat {
            color: var(--dim);
            background: rgba(148, 180, 255, 0.08);
        }

        /* Pace */
        .pace-leader {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 18px;
            background: linear-gradient(120deg, rgba(255,207,102,0.10), rgba(137,215,255,0.06));
            border: 1px solid rgba(255,207,102,0.18);
            margin-bottom: 12px;
        }

        .pace-leader img {
            width: 56px; height: 56px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .pace-leader-info strong {
            display: block;
            font-size: 1.05rem;
        }

        .pace-leader-info span {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .pace-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .pace-stat {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .pace-stat .pace-stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            line-height: 1;
        }

        .pace-stat .pace-stat-label {
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ============ DASHBOARD ============ */
        .dashboard {
            display: grid;
            grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
            gap: 18px;
        }

        .focus-panel, .leaderboard {
            border-radius: 28px;
            padding: 24px;
        }

        .focus-panel { display: grid; gap: 18px; align-content: start; }

        .focus-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .focus-avatar {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.14);
            box-shadow: 0 14px 34px rgba(0,0,0,0.4);
        }

        .focus-kicker {
            color: var(--gold);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-weight: 600;
        }

        .focus-panel h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            line-height: 1;
            margin-top: 6px;
            letter-spacing: 0.01em;
        }

        .focus-copy {
            color: var(--muted);
            line-height: 1.58;
            font-size: 0.94rem;
        }

        .focus-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-tile {
            border-radius: 16px;
            padding: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .stat-tile strong {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 1.15rem;
        }

        .stat-tile span {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .focus-sparkline {
            border-radius: 16px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .focus-sparkline-head {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .focus-sparkline svg {
            width: 100%;
            height: 64px;
            display: block;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            display: inline-block;
            padding: 5px 11px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .badge--gold { background: rgba(255, 207, 102, 0.16); border: 1px solid rgba(255, 207, 102, 0.32); color: #ffd56d; }
        .badge--cyan { background: rgba(137, 215, 255, 0.14); border: 1px solid rgba(137, 215, 255, 0.28); color: #89d7ff; }
        .badge--purple { background: rgba(183, 146, 255, 0.14); border: 1px solid rgba(183, 146, 255, 0.28); color: #b792ff; }
        .badge--green { background: rgba(111, 221, 139, 0.14); border: 1px solid rgba(111, 221, 139, 0.28); color: #6fdd8b; }
        .badge--orange { background: rgba(255, 144, 121, 0.14); border: 1px solid rgba(255, 144, 121, 0.28); color: #ff9079; }
        .badge--magenta { background: rgba(255, 123, 250, 0.14); border: 1px solid rgba(255, 123, 250, 0.28); color: #ff7bfa; }

        .focus-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            padding: 12px 18px;
            border-radius: 14px;
            background: linear-gradient(120deg, rgba(255, 207, 102, 0.20), rgba(137, 215, 255, 0.16));
            border: 1px solid rgba(255, 207, 102, 0.30);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .focus-link:hover { transform: translateY(-1px); }

        /* ============ LEADERBOARD ============ */
        .leaderboard { display: grid; gap: 16px; }

        .leaderboard-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-end;
        }

        .leaderboard-head h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 0.02em;
        }

        .leaderboard-head p { color: var(--muted); font-size: 0.88rem; }

        .leaderboard-columns {
            display: grid;
            grid-template-columns: 44px 56px minmax(0, 1.6fr) 1fr 70px 70px 70px 70px;
            gap: 12px;
            padding: 6px 14px;
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--dim);
            font-weight: 600;
        }

        .leaderboard-list { display: grid; gap: 8px; }

        .leaderboard-row {
            width: 100%;
            display: grid;
            grid-template-columns: 44px 56px minmax(0, 1.6fr) 1fr 70px 70px 70px 70px;
            gap: 12px;
            align-items: center;
            text-align: left;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: inherit;
            cursor: pointer;
            transition: all 0.22s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .leaderboard-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--row-color, var(--cyan));
            opacity: 0.6;
        }

        .leaderboard-row:hover,
        .leaderboard-row.is-active {
            transform: translateX(2px);
            border-color: rgba(255, 207, 102, 0.30);
            background: rgba(255,255,255,0.06);
        }

        .leaderboard-row.is-active::before { opacity: 1; width: 5px; }

        .leaderboard-rank {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-family: 'Bebas Neue', sans-serif;
            color: var(--text);
            font-size: 1.25rem;
        }

        .leaderboard-row.rank-1 .leaderboard-rank { background: rgba(255,207,102,0.16); color: var(--gold); border: 1px solid rgba(255,207,102,0.32); }
        .leaderboard-row.rank-2 .leaderboard-rank { background: rgba(214,223,245,0.10); color: var(--silver); border: 1px solid rgba(214,223,245,0.22); }
        .leaderboard-row.rank-3 .leaderboard-rank { background: rgba(246,168,120,0.12); color: var(--bronze); border: 1px solid rgba(246,168,120,0.26); }

        .leaderboard-row img {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            object-fit: cover;
        }

        .lb-name strong {
            display: block;
            font-size: 0.98rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-name .lb-bar {
            margin-top: 6px;
            height: 4px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            overflow: hidden;
        }

        .lb-name .lb-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: var(--row-color, var(--cyan));
            box-shadow: 0 0 12px var(--row-color, var(--cyan));
        }

        .lb-name .lb-meta {
            margin-top: 4px;
            font-size: 0.74rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        .lb-spark svg {
            width: 100%;
            height: 38px;
            display: block;
        }

        .lb-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.92rem;
            text-align: right;
            color: var(--text);
        }

        .lb-num small {
            display: block;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--dim);
            margin-top: 2px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .lb-num.delta-up { color: var(--green); }
        .lb-num.delta-down { color: var(--red); }

        /* ============ CHARTS ============ */
        .charts-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
            gap: 18px;
        }

        .chart-section {
            border-radius: 28px;
            padding: 24px;
        }

        .chart-header {
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .chart-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.65rem;
            letter-spacing: 0.02em;
        }

        .chart-header p {
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: 2px;
        }

        #history-chart, #weekly-chart {
            width: 100%;
            height: 320px;
            display: block;
        }

        .footer {
            text-align: center;
            color: rgba(216, 228, 255, 0.55);
            font-size: 0.84rem;
            padding: 10px 0 20px;
        }

        .loading, .error {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .loading-card, .error-card {
            width: min(520px, 100%);
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .loading-card h1, .error-card h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: var(--gold);
        }

        .loading-card p, .error-card p {
            color: var(--muted);
            line-height: 1.6;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1200px) {
            .kpi-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .charts-grid { grid-template-columns: 1fr; }
            .side-grid { grid-template-columns: 1fr; }
            .leaderboard-columns,
            .leaderboard-row {
                grid-template-columns: 44px 52px minmax(0, 1.4fr) 1fr 70px;
            }
            .lb-hide-md { display: none; }
        }

        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; gap: 22px; }
            .dashboard { grid-template-columns: 1fr; }
        }

        @media (max-width: 720px) {
            .app {
                width: min(100vw - 16px, 1480px);
                margin: 12px auto;
            }

            .hero, .podium, .focus-panel, .leaderboard, .insight-panel, .chart-section {
                padding: 18px;
            }

            .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .focus-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .city-scene { min-height: 540px; height: 78vh; }

            .leaderboard-columns { display: none; }
            .leaderboard-row {
                grid-template-columns: 38px 48px minmax(0, 1fr) 60px;
                gap: 10px;
            }
            .lb-hide-sm { display: none; }

            .podium-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .podium-slot.is-first { transform: none; }

            .scene-toolbar { top: 10px; right: 10px; }
            .toolbar-btn { padding: 7px 11px; font-size: 0.74rem; }

            #history-chart, #weekly-chart { height: 240px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="loading-card panel">
                <h1>Carregando a cidade</h1>
                <p>Gerando a skyline 3D da competição e conectando os prédios aos dados mais recentes.</p>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
