<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribution Competition 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .year-badge {
            display: inline-block;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8892b0;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 40px 0;
            padding: 20px;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .podium-place:hover {
            transform: translateY(-10px);
        }

        .podium-place.first { order: 2; }
        .podium-place.second { order: 1; }
        .podium-place.third { order: 3; }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid;
            margin-bottom: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .first .avatar {
            width: 100px;
            height: 100px;
            border-color: #f1c40f;
        }
        .second .avatar { border-color: #bdc3c7; }
        .third .avatar { border-color: #cd6133; }

        .username {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85rem;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        .contributions {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .first .contributions { color: #f1c40f; font-size: 2rem; }
        .second .contributions { color: #bdc3c7; }
        .third .contributions { color: #cd6133; }

        .pedestal {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px 10px 0 0;
        }

        .first .pedestal {
            height: 150px;
            background: linear-gradient(180deg, #f1c40f, #f39c12);
            width: 140px;
        }

        .second .pedestal {
            height: 110px;
            background: linear-gradient(180deg, #bdc3c7, #95a5a6);
        }

        .third .pedestal {
            height: 80px;
            background: linear-gradient(180deg, #cd6133, #a0522d);
        }

        .medal {
            font-size: 2.5rem;
        }

        .first .medal { font-size: 3rem; }

        .stats-table {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }

        .city-section {
            position: relative;
            margin: 30px 0 24px;
            padding: 28px 24px 36px;
            border-radius: 28px;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 216, 122, 0.18), transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(124, 187, 255, 0.12), transparent 24%),
                linear-gradient(180deg, rgba(6, 18, 46, 0.95) 0%, rgba(7, 20, 44, 0.92) 48%, rgba(12, 14, 28, 0.98) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 24px 60px rgba(0,0,0,0.28);
        }

        .city-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(transparent 0 74%, rgba(255, 181, 72, 0.05) 74% 75%, transparent 75% 100%),
                linear-gradient(90deg, transparent 0 12%, rgba(255,255,255,0.04) 12% 13%, transparent 13% 100%);
            opacity: 0.35;
            pointer-events: none;
        }

        .city-header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 22px;
        }

        .city-title h2 {
            font-size: 1.4rem;
            color: #ffd36b;
            margin-bottom: 6px;
        }

        .city-title p {
            color: #9eb3d2;
            max-width: 540px;
            line-height: 1.4;
        }

        .city-summary {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .summary-card {
            min-width: 120px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }

        .summary-card strong {
            display: block;
            font-size: 1.2rem;
            color: #fff3c1;
        }

        .summary-card span {
            font-size: 0.82rem;
            color: #9eb3d2;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .city-skyline {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 14px;
            min-height: 420px;
            padding: 70px 8px 88px;
        }

        .city-skyline::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 58px;
            height: 14px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255, 179, 71, 0.3), rgba(255,255,255,0.08), rgba(255, 179, 71, 0.3));
            box-shadow: 0 0 30px rgba(255, 179, 71, 0.12);
        }

        .building {
            --building-height: 220px;
            --building-width: 110px;
            --accent: #7cc5ff;
            --accent-soft: rgba(124, 197, 255, 0.16);
            --window-color: rgba(255, 231, 152, 0.9);
            --glow-color: rgba(124, 197, 255, 0.3);
            position: relative;
            width: var(--building-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .building:hover {
            transform: translateY(-10px);
        }

        .building.leader {
            z-index: 3;
            transform: translateY(-18px);
        }

        .building.leader:hover {
            transform: translateY(-26px) scale(1.02);
        }

        .building.leader::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 34px;
            width: calc(var(--building-width) + 68px);
            height: calc(var(--building-height) + 92px);
            transform: translateX(-50%);
            border-radius: 34px 34px 18px 18px;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 242, 186, 0.22), transparent 30%),
                linear-gradient(180deg, rgba(255, 221, 120, 0.18), rgba(255, 171, 63, 0.06) 40%, transparent 100%);
            box-shadow:
                0 0 0 1px rgba(255, 228, 144, 0.14),
                0 0 42px rgba(255, 193, 79, 0.18);
            pointer-events: none;
        }

        .building-crown {
            position: absolute;
            top: 8px;
            font-size: 1.7rem;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
        }

        .building-structure {
            position: relative;
            width: 100%;
            height: var(--building-height);
            margin-top: auto;
            border-radius: 18px 18px 8px 8px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.18), transparent 22%),
                linear-gradient(160deg, rgba(255,255,255,0.12) 0%, transparent 35%),
                linear-gradient(180deg, var(--accent) 0%, #132243 34%, #0d1731 100%);
            border: 1px solid rgba(255,255,255,0.09);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.12),
                0 18px 34px rgba(0,0,0,0.28),
                0 0 0 1px rgba(255,255,255,0.02);
            overflow: hidden;
        }

        .building.leader .building-structure {
            border-radius: 26px 26px 12px 12px;
            border-color: rgba(255, 233, 157, 0.32);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.24), transparent 18%),
                linear-gradient(160deg, rgba(255, 232, 165, 0.28) 0%, transparent 36%),
                linear-gradient(180deg, #ffd768 0%, #d88d2d 18%, #17315d 42%, #0d1731 100%);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.18),
                inset 0 0 38px rgba(255, 219, 125, 0.08),
                0 28px 46px rgba(0,0,0,0.34),
                0 0 44px rgba(255, 194, 82, 0.18);
        }

        .building-structure::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            width: 12px;
            height: 24px;
            transform: translateX(-50%);
            border-radius: 999px 999px 0 0;
            background: linear-gradient(180deg, #fff6c8, var(--accent));
            box-shadow: 0 0 16px var(--glow-color);
        }

        .building.leader .building-structure::before {
            top: -42px;
            width: 26px;
            height: 52px;
            border-radius: 999px 999px 8px 8px;
            background: linear-gradient(180deg, #fffbe0, #ffd15c 46%, #ffae3d 100%);
            box-shadow:
                0 0 22px rgba(255, 224, 136, 0.45),
                0 0 46px rgba(255, 181, 68, 0.26);
        }

        .building-structure::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.1) 0 10%, transparent 10% 82%, rgba(0,0,0,0.14) 82% 100%),
                linear-gradient(180deg, transparent 0 78%, rgba(0,0,0,0.18) 78% 100%);
            pointer-events: none;
        }

        .building-roof {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 68%;
            height: 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            box-shadow: 0 0 18px var(--glow-color);
        }

        .building.leader .building-roof {
            top: 18px;
            width: 78%;
            height: 18px;
            background: linear-gradient(90deg, rgba(255, 238, 177, 0.95), rgba(255, 200, 87, 0.8));
            box-shadow:
                0 0 24px rgba(255, 214, 118, 0.42),
                0 0 60px rgba(255, 175, 56, 0.18);
        }

        .leader-crown-ring {
            position: absolute;
            top: 34px;
            left: 50%;
            width: calc(var(--building-width) + 26px);
            height: 22px;
            transform: translateX(-50%);
            border-radius: 999px;
            border: 1px solid rgba(255, 229, 153, 0.5);
            background: rgba(255, 229, 153, 0.08);
            box-shadow:
                0 0 18px rgba(255, 214, 118, 0.28),
                inset 0 0 12px rgba(255,255,255,0.08);
        }

        .leader-spire {
            position: absolute;
            top: -58px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.3rem;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.32));
        }

        .building-face {
            position: absolute;
            inset: 28px 14px 18px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            align-content: start;
            gap: 7px;
        }

        .window {
            height: 10px;
            border-radius: 3px;
            background: rgba(18, 37, 69, 0.65);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .window.lit {
            background: var(--window-color);
            box-shadow: 0 0 12px rgba(255, 220, 127, 0.4);
            border-color: rgba(255,255,255,0.1);
        }

        .building.leader .window {
            border-radius: 4px;
            background: rgba(26, 39, 65, 0.55);
        }

        .building.leader .window.lit {
            background: linear-gradient(180deg, #fff5c8 0%, #ffd86f 100%);
            box-shadow:
                0 0 16px rgba(255, 215, 111, 0.45),
                0 0 28px rgba(255, 189, 70, 0.18);
        }

        .building-base {
            width: calc(var(--building-width) + 18px);
            height: 14px;
            border-radius: 999px;
            margin-top: 8px;
            background: radial-gradient(circle, rgba(255, 197, 102, 0.32), rgba(255, 197, 102, 0.06) 65%, transparent 80%);
        }

        .building.leader .building-base {
            width: calc(var(--building-width) + 56px);
            height: 22px;
            margin-top: 10px;
            background:
                radial-gradient(circle, rgba(255, 235, 162, 0.42), rgba(255, 181, 66, 0.16) 54%, transparent 78%);
            filter: drop-shadow(0 0 16px rgba(255, 192, 78, 0.18));
        }

        .building-label {
            margin-top: 14px;
            text-align: center;
            max-width: 140px;
        }

        .building.leader .building-label {
            max-width: 180px;
            margin-top: 16px;
        }

        .building-label strong {
            display: block;
            font-size: 0.92rem;
            margin-bottom: 4px;
        }

        .building.leader .building-label strong {
            font-size: 1.06rem;
            color: #fff5c8;
            text-shadow: 0 0 18px rgba(255, 206, 88, 0.18);
        }

        .building-label span {
            color: #9eb3d2;
            font-size: 0.8rem;
        }

        .building.leader .building-label span {
            color: #ffe7a3;
            font-size: 0.84rem;
        }

        .building-metrics {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .metric-pill {
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d8e7ff;
            font-size: 0.72rem;
        }

        .building.leader .metric-pill {
            background: rgba(255, 221, 129, 0.12);
            border-color: rgba(255, 227, 145, 0.18);
            color: #fff3c1;
            box-shadow: inset 0 0 18px rgba(255, 204, 97, 0.05);
        }

        .leader-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255, 228, 143, 0.18), rgba(255, 176, 59, 0.18));
            border: 1px solid rgba(255, 224, 141, 0.28);
            color: #fff1ba;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .stats-table h2 {
            margin-bottom: 20px;
            color: #f39c12;
            text-align: center;
        }

        .stat-row {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.3s ease;
            gap: 10px;
        }

        .stat-row:hover {
            background: rgba(255,255,255,0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .rank {
            font-size: 1.5rem;
            font-weight: bold;
            width: 50px;
            min-width: 50px;
            text-align: center;
            flex-shrink: 0;
        }

        .rank.gold { color: #f1c40f; }
        .rank.silver { color: #bdc3c7; }
        .rank.bronze { color: #cd6133; }

        .stat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .stat-info {
            flex: 1;
            min-width: 0;
        }

        .stat-username {
            font-weight: bold;
            font-size: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stat-username a {
            color: #fff;
            text-decoration: none;
        }

        .stat-username a:hover {
            color: #f39c12;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease-out;
        }

        .progress-fill {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }

        .rank.gold + .stat-avatar + .stat-info .progress-fill { background: linear-gradient(90deg, #f1c40f, #f39c12); }
        .rank.silver + .stat-avatar + .stat-info .progress-fill { background: linear-gradient(90deg, #bdc3c7, #95a5a6); }
        .rank.bronze + .stat-avatar + .stat-info .progress-fill { background: linear-gradient(90deg, #cd6133, #a0522d); }

        .stat-count {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f39c12;
            min-width: 60px;
            text-align: right;
        }

        .last-updated {
            text-align: center;
            color: #8892b0;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #8892b0;
            font-size: 0.9rem;
        }

        footer a {
            color: #f39c12;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .podium { flex-direction: column; align-items: center; gap: 20px; }
            .podium-place { order: unset !important; }
            .pedestal { height: 60px !important; width: 180px !important; }
            .first .avatar, .avatar { width: 70px !important; height: 70px !important; }
            .stat-row { padding: 12px 10px; }
            .stat-username { font-size: 0.9rem; }
            .stat-count { font-size: 1.2rem; min-width: 50px; }
            .rank { font-size: 1.3rem; width: 40px; min-width: 40px; }
            .stat-avatar { width: 40px; height: 40px; margin-right: 10px; }
            .stats-table { padding: 15px; }
            .city-section { padding: 22px 16px 26px; }
            .city-header { flex-direction: column; align-items: flex-start; }
            .city-summary { justify-content: flex-start; }
            .city-skyline {
                justify-content: flex-start;
                overflow-x: auto;
                padding: 56px 8px 76px;
                min-height: 360px;
            }
            .building {
                flex: 0 0 auto;
                --building-width: 92px;
            }
            .building.leader {
                transform: translateY(-8px);
            }
            .building.leader:hover {
                transform: translateY(-12px) scale(1.01);
            }
            .summary-card { min-width: 108px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="competition-title">Contribution Competition</h1>
            <p id="competition-subtitle" class="subtitle">Quem vai dominar o GitHub em 2026?</p>
            <span id="competition-year" class="year-badge">2026</span>
        </header>

        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Carregando contribuições...</p>
            </div>
        </div>

        <footer>
            <p>Feito com muito código por <a href="https://github.com/Guilherme-Rodrigues-PX" target="_blank">Guilherme</a></p>
            <p style="margin-top: 10px;">Que o melhor dev vença!</p>
        </footer>
    </div>

    <script>
        const DATA_PATH = './data/competition.json';

        async function loadCompetitionData() {
            const response = await fetch(DATA_PATH, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error('Arquivo de dados indisponivel');
            }

            return response.json();
        }

        function getMedal(index) {
            const medals = ['🥇', '🥈', '🥉'];
            return medals[index] || `${index + 1}º`;
        }

        function getRankClass(index) {
            const classes = ['gold', 'silver', 'bronze'];
            return classes[index] || '';
        }

        function getPlaceClass(index) {
            const classes = ['first', 'second', 'third'];
            return classes[index] || '';
        }

        function formatCompact(value) {
            return new Intl.NumberFormat('pt-BR', { notation: 'compact' }).format(value);
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function getBuildingAccent(index) {
            const palette = [
                { accent: '#f7b955', soft: 'rgba(247, 185, 85, 0.18)', window: 'rgba(255, 234, 163, 0.95)', glow: 'rgba(247, 185, 85, 0.34)' },
                { accent: '#6dd3ff', soft: 'rgba(109, 211, 255, 0.16)', window: 'rgba(196, 241, 255, 0.95)', glow: 'rgba(109, 211, 255, 0.3)' },
                { accent: '#ff8a80', soft: 'rgba(255, 138, 128, 0.18)', window: 'rgba(255, 218, 214, 0.95)', glow: 'rgba(255, 138, 128, 0.3)' },
                { accent: '#a98dff', soft: 'rgba(169, 141, 255, 0.18)', window: 'rgba(230, 222, 255, 0.95)', glow: 'rgba(169, 141, 255, 0.3)' },
                { accent: '#56e39f', soft: 'rgba(86, 227, 159, 0.16)', window: 'rgba(205, 255, 229, 0.95)', glow: 'rgba(86, 227, 159, 0.28)' }
            ];

            return palette[index % palette.length];
        }

        function createWindows(litCount) {
            const totalWindows = 24;
            const litWindows = clamp(litCount, 4, totalWindows);

            return Array.from({ length: totalWindows }, (_, index) => {
                const lit = index < litWindows ? 'lit' : '';
                return `<span class="window ${lit}"></span>`;
            }).join('');
        }

        function renderCity(competitors) {
            const maxContributions = Math.max(...competitors.map((competitor) => competitor.contributions), 1);
            const totalContributions = competitors.reduce((sum, competitor) => sum + competitor.contributions, 0);
            const totalCommits = competitors.reduce((sum, competitor) => sum + (competitor.commits || 0), 0);
            const totalPullRequests = competitors.reduce((sum, competitor) => sum + (competitor.pullRequests || 0), 0);
            const leader = competitors[0];

            const skyline = competitors.map((competitor, index) => {
                const ratio = competitor.contributions / maxContributions;
                const isLeader = index === 0;
                const baseHeight = Math.round(150 + ratio * 210);
                const baseWidth = Math.round(82 + ((competitor.pullRequests || 0) / Math.max(totalPullRequests, 1)) * 42);
                const height = isLeader ? baseHeight + 70 : baseHeight;
                const width = isLeader ? baseWidth + 24 : baseWidth;
                const litCount = Math.round((competitor.contributions / Math.max(totalContributions, 1)) * 24) + (isLeader ? 4 : 0);
                const accent = getBuildingAccent(index);

                return `
                    <article
                        class="building ${isLeader ? 'leader' : ''}"
                        style="--building-height: ${height}px; --building-width: ${width}px; --accent: ${accent.accent}; --accent-soft: ${accent.soft}; --window-color: ${accent.window}; --glow-color: ${accent.glow};"
                    >
                        ${isLeader ? '<div class="building-crown">👑</div>' : ''}
                        <div class="building-structure">
                            ${isLeader ? '<div class="leader-spire">🏆</div><div class="leader-crown-ring"></div>' : ''}
                            <div class="building-roof"></div>
                            <div class="building-face">
                                ${createWindows(litCount)}
                            </div>
                        </div>
                        <div class="building-base"></div>
                        <div class="building-label">
                            <strong>${competitor.username}</strong>
                            <span>${formatCompact(competitor.contributions)} contribuicoes</span>
                            ${isLeader ? '<div class="leader-badge">Hall da Fama</div>' : ''}
                            <div class="building-metrics">
                                <span class="metric-pill">${competitor.commits || 0} commits</span>
                                <span class="metric-pill">${competitor.pullRequests || 0} PRs</span>
                                <span class="metric-pill">${competitor.reviews || 0} reviews</span>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');

            return `
                <section class="city-section">
                    <div class="city-header">
                        <div class="city-title">
                            <h2>Git City 2026</h2>
                            <p>Cada predio representa um dev. Altura mostra contribuicoes totais, largura responde a pull requests e a iluminacao acompanha o peso do participante na competicao.</p>
                        </div>
                        <div class="city-summary">
                            <div class="summary-card">
                                <strong>${formatCompact(totalContributions)}</strong>
                                <span>Contribuicoes</span>
                            </div>
                            <div class="summary-card">
                                <strong>${formatCompact(totalCommits)}</strong>
                                <span>Commits</span>
                            </div>
                            <div class="summary-card">
                                <strong>${leader ? leader.username : '-'}</strong>
                                <span>Lider atual</span>
                            </div>
                        </div>
                    </div>
                    <div class="city-skyline">
                        ${skyline}
                    </div>
                </section>
            `;
        }

        function updateHeader(competition) {
            document.getElementById('competition-title').textContent = competition.title;
            document.getElementById('competition-subtitle').textContent = competition.subtitle;
            document.getElementById('competition-year').textContent = String(competition.year);
            document.title = `${competition.title} ${competition.year}`;
        }

        function renderResults(competition) {
            const competitors = [...competition.competitors].sort((a, b) => b.contributions - a.contributions);
            const maxContributions = Math.max(...competitors.map(d => d.contributions), 1);
            const cityHTML = renderCity(competitors);

            const podiumHTML = `
                <div class="podium">
                    ${competitors.slice(0, 3).map((competitor, index) => `
                        <div class="podium-place ${getPlaceClass(index)}">
                            <img src="${competitor.avatar}" alt="${competitor.username}" class="avatar">
                            <span class="username">${competitor.username}</span>
                            <span class="contributions">${competitor.contributions}</span>
                            <div class="pedestal">
                                <span class="medal">${getMedal(index)}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            const tableHTML = `
                <div class="stats-table">
                    <h2>Ranking Completo</h2>
                    ${competitors.map((competitor, index) => `
                        <div class="stat-row">
                            <span class="rank ${getRankClass(index)}">${getMedal(index)}</span>
                            <img src="${competitor.avatar}" alt="${competitor.username}" class="stat-avatar">
                            <div class="stat-info">
                                <div class="stat-username">
                                    <a href="${competitor.profile}" target="_blank">${competitor.username}</a>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${(competitor.contributions / maxContributions) * 100}%"></div>
                                </div>
                            </div>
                            <span class="stat-count">${competitor.contributions}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            const lastUpdated = `
                <div class="last-updated">
                    Última atualização: ${new Date(competition.updatedAt).toLocaleString('pt-BR')}
                </div>
            `;

            document.getElementById('content').innerHTML = cityHTML + podiumHTML + tableHTML + lastUpdated;

            // Animate progress bars
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.style.width;
                });
            }, 100);
        }

        function renderError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <p>Erro ao carregar dados: ${message}</p>
                    <p>Verifique se o workflow de atualização já gerou o JSON.</p>
                </div>
            `;
        }

        // Initialize
        loadCompetitionData()
            .then((competition) => {
                updateHeader(competition);
                renderResults(competition);
            })
            .catch(error => renderError(error.message));
    </script>
</body>
</html>
