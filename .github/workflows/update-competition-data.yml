name: Update Competition Data

on:
  workflow_dispatch:
  push:
    paths:
      - config/competition.json
      - scripts/build-competition-data.mjs
      - .github/workflows/update-competition-data.yml
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build competition data
        env:
          COMPETITION_GITHUB_TOKEN: ${{ secrets.COMPETITION_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPETITION_WEBHOOK_URL: ${{ secrets.COMPETITION_WEBHOOK_URL }}
        run: node scripts/build-competition-data.mjs

      - name: Commit updated data
        run: |
          git add data/

          if git diff --cached --quiet --exit-code; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update competition data"
          git push
